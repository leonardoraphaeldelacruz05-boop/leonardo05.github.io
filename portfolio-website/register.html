<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Educational Portfolio</title>
    <link rel="stylesheet" href="css/styles.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            margin: 1rem;
        }
        .auth-card h2 {
            text-align: center;
            color: #4a6fa5;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4a6fa5;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: #4a6fa5;
            color: white;
        }
        .btn-primary:hover {
            background: #3d5a8a;
        }
        .auth-link {
            text-align: center;
            margin-top: 1.2rem;
        }
        .auth-link a {
            color: #4a6fa5;
            text-decoration: none;
        }
        .message-box {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            text-align: center;
        }
        .message-box.success {
            background: #d4edda;
            color: #155724;
        }
        .message-box.error {
            background: #f8d7da;
            color: #721c24;
        }
        .hidden {
            display: none;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.75rem;
            margin-top: 0.3rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create an Account</h2>
        <p class="subtitle"><strong>2nd Year BSIT | OLSHC-G</strong></p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
                <span class="error-message" id="fullnameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password (min 6 chars, 1 uppercase, 1 number):</label>
                <input type="password" id="password" placeholder="Enter your password">
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <span class="error-message" id="confirmError"></span>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the Terms and Conditions</label>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
        
        <div id="registerMessage" class="message-box hidden"></div>
    </div>

    <script src="js/script.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const messageBox = document.getElementById('registerMessage');
            
            messageBox.classList.add('hidden');
            document.getElementById('fullnameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmError').textContent = '';
            
            let isValid = true;
            
            if (fullname.length < 2) {
                document.getElementById('fullnameError').textContent = 'Full name must be at least 2 characters';
                isValid = false;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                document.getElementById('emailError').textContent = 'Please enter a valid email';
                isValid = false;
            }
            
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                isValid = false;
            } else if (!/[A-Z]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must have 1 uppercase letter';
                isValid = false;
            } else if (!/[0-9]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must have 1 number';
                isValid = false;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('confirmError').textContent = 'Passwords do not match';
                isValid = false;
            }
            
            if (!terms) {
                alert('Please agree to the Terms and Conditions');
                isValid = false;
            }
            
            if (isValid) {
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const userExists = users.some(u => u.email === email);
                
                if (userExists) {
                    messageBox.textContent = 'Email already registered! Please login.';
                    messageBox.classList.add('error');
                    messageBox.classList.remove('hidden');
                    return;
                }
                
                const newUser = {
                    fullname: fullname,
                    email: email,
                    password: password,
                    username: email.split('@')[0]
                };
                
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                messageBox.textContent = 'Registration successful! Redirecting to login...';
                messageBox.classList.add('success');
                messageBox.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
